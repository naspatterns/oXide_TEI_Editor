# Continuous-integration gate for oXide TEI Editor.
#
# Runs the same checks the maintainer runs locally — lint, typecheck+build,
# and the Vitest suite — on every push to master and every pull request that
# targets it. Before this workflow the repo deployed straight to GitHub Pages
# with no test/lint gate, so a broken build or a failing test could ship
# (audit #26).

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Read-only token: this workflow only inspects the code, it never writes.
permissions:
  contents: read

# Newer runs of the same ref supersede in-flight ones.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck & build
        run: npm run build

      - name: Test
        run: npm run test:run
